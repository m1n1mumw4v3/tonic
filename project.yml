name: Estus
options:
  bundleIdPrefix: com.estus
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: "5.0.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.0.0"

targets:
  Estus:
    type: application
    platform: iOS
    configFiles:
      Debug: Configuration/Debug.xcconfig
      Release: Configuration/Release.xcconfig
    sources:
      - path: Estus
        excludes:
          - "Supabase/migrations/**"
          - "Supabase/functions/**"
          - "Resources/**"
          - "Info.plist"
      - path: Estus/Resources
        buildPhase: resources
    info:
      path: Estus/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIApplicationSupportsIndirectInputEvents: true
        UIAppFonts:
          - Geist-Light.ttf
          - Geist-Regular.ttf
          - Geist-Medium.ttf
          - Geist-SemiBold.ttf
          - Geist-Bold.ttf
          - GeistMono-Regular.ttf
          - GeistMono-Medium.ttf
          - GeistPixel-Grid.ttf
          - Roboto-Medium.ttf
        SupabaseURL: $(SUPABASE_URL)
        SupabaseAnonKey: $(SUPABASE_ANON_KEY)
        RevenueCatAPIKey: $(REVENUECAT_API_KEY)
        PostHogAPIKey: $(POSTHOG_API_KEY)
        PostHogHost: $(POSTHOG_HOST)
        NSHealthShareUsageDescription: "Estus reads your health data to personalize supplement recommendations and track wellness trends."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleDefault
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.estus.app
    settings:
      base:
        PRODUCT_NAME: Estus
        PRODUCT_MODULE_NAME: Estus
        PRODUCT_BUNDLE_IDENTIFIER: com.estus.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Supabase
        product: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: PostHog
        product: PostHog

  EstusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EstusTests
    dependencies:
      - target: Estus
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Estus.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Estus"
        BUNDLE_LOADER: "$(TEST_HOST)"
